<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <linearGradient id="tickGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0D1117"/>

  <!-- Clock circle — bottom 270° arc, leaving top-right open for checkmark -->
  <path
    d="M 73.5 26.5
       A 34 34 0 1 0 82 54"
    fill="none"
    stroke="#1E3A5F"
    stroke-width="7"
    stroke-linecap="round"
  />

  <!-- Neon checkmark bursting from top-right of circle -->
  <polyline
    points="61,18 72,30 88,10"
    fill="none"
    stroke="#39FF14"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Hour tick marks (subtle) -->
  <line x1="50" y1="18" x2="50" y2="24" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="76" x2="50" y2="82" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="50" x2="24" y2="50" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="50" x2="82" y2="50" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>

  <!-- Clock hands -->
  <line x1="50" y1="50" x2="50" y2="32" stroke="#39FF14" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="50" x2="64" y2="50" stroke="#39FF14" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3.5" fill="#39FF14"/>
</svg>
